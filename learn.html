<html>
    <head>  
        <title>My form</title>

    </head>
    <body style="background-color: lightgray; font-family: Arial, sans-serif;">
    <h1 Style=>This is my Form</h1>
    <div Style="background-color: lightgray; padding: 20px; border-radius: 10px; width: 400px;" align="center" border-align="center">
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" minlength="3" maxlength="20" required style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;" required>
        <br><br>
        <label for="password">password:</label>
        <input type="password" id="password" placeholder="Enter your password" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;" required>
        <br><br>
        <label for="date">Birthday:</label>
        <input type="date" id="date" required style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
        <br><br>
        <label for="Gender">Gender:</label>
        
        <label for="Male">Male:</label>
        <input type="radio" id="Male" value="Male" name="Gender" style="margin-left: 10px;"> 
        <label for="Female">Female:</label>
        <input type="radio" id="Female" value="Female" name="Gender" style="margin-left: 10px;">
        <label for="Rather not say">Prefer not to say:</label>
        <input type="radio" id="Rather not say" value="Rather not say" name="Gender" style="margin-left: 10px;">
        <br><br>
        <label for="phone">phone#: </label>
        <input type="tel" id="phone" placeholder="Enter your phone number" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
        <br><br>
        <label for="Country">Country:</label>
        <select id="Country" name="Country" required style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="Pakistan">Pakistan</option>
            <option value="India">India</option>
            <option value="Russia">Russia</option>
            <option value="Japan">Japan</option>
            <option value="United States">United  States</option>
            <option value="United Kingdom">United Kingdom</option>
            <option value="Germany">Germany</option>
            <option value="France">France</option>
            <option value="Italy">Italy</option>
            <option value="Spain">Spain</option>
            <option value="Australia">Australia</option>
            <option value="Canada">Canada</option>
            <option value="Brazil">Brazil</option>
            <option value="Mexico">Mexico</option>
            <option value="South Africa">South Africa</option>
            <option value="China">China</option>
            <option value="Ghana">Ghana</option>

        </select> <br><br>

        <input type="submit"   value="Submit" Style="background-color: lightblue; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; align">
        <input type="reset" value="Reset" Style="background-color: lightcoral; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
        
    </form>
    </div>
        </body> 
    </html >
